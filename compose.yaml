networks:
  public:
    driver: bridge
  private:
    driver: bridge
    ipam:
      config:
        - subnet: 10.21.0.0/16
          gateway: 10.21.0.1

volumes:
  postgres_data: {}
  redis_data: {}
  minio_data: {}
  gosign_lc_pages: {}
  gosign_lc_signed: {}
  gosign_lc_uploads: {}
  gosign_lc_tmp: {}
  gosign_base: {}
  gosign_assets: {}

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "20M"
    max-file: "10"
    tag: "{{.ImageName}}|{{.Name}}"

services:
  postgres:
    image: postgres:17-alpine
    container_name: service.postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-goSign}
      POSTGRES_DB: ${POSTGRES_DB:-goSign}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgresPassword}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-goSign}"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - private
    logging: *default-logging

  redis:
    image: redis:7-alpine
    container_name: service.redis
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --requirepass "${REDIS_PASSWORD:-redisPassword}"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redisPassword}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - private
    logging: *default-logging

  minio:
    image: minio/minio:latest
    container_name: service.minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - private
    logging: *default-logging

  minio-init:
    image: minio/mc:latest
    container_name: service.minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      /usr/bin/mc mb --ignore-existing myminio/gosign;
      /usr/bin/mc policy set download myminio/gosign;
      exit 0;
      "
    networks:
      - private

  gosign:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    image: gosign:latest
    container_name: service.gosign
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      GOSIGN_HTTP_ADDR: "0.0.0.0:8088"
      GOSIGN_DEV_MODE: "false"
      GOSIGN_POSTGRES_URL: "postgres://${POSTGRES_USER:-goSign}:${POSTGRES_PASSWORD:-postgresPassword}@postgres:5432/${POSTGRES_DB:-goSign}?pool_max_conns=10"
      GOSIGN_REDIS_ADDRESS: "redis:6379"
      GOSIGN_REDIS_PASSWORD: "${REDIS_PASSWORD:-redisPassword}"
    volumes:
      - gosign_lc_pages:/app/lc_pages
      - gosign_lc_signed:/app/lc_signed
      - gosign_lc_uploads:/app/lc_uploads
      - gosign_lc_tmp:/app/lc_tmp
      - gosign_base:/app/base
      - gosign_assets:/app/assets
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8088/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - private
    logging: *default-logging

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    image: gosign-frontend:latest
    container_name: service.frontend
    restart: always
    depends_on:
      gosign:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - private
    logging: *default-logging

  nginx:
    image: nginx:alpine
    container_name: service.nginx
    restart: always
    depends_on:
      gosign:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - 80:80
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - private
      - public
    logging: *default-logging
