upstream gosign_backend {
    server gosign:8088;
    keepalive 32;
}

upstream gosign_frontend {
    server frontend:80;
    keepalive 16;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";
    proxy_connect_timeout 10s;
    proxy_read_timeout    120s;
    proxy_send_timeout    120s;

    location /api/      { proxy_pass http://gosign_backend; }
    location /auth/     { proxy_pass http://gosign_backend; }
    location /public/   { proxy_pass http://gosign_backend; }
    location /drive/    { proxy_pass http://gosign_backend; }
    location /swagger/  { proxy_pass http://gosign_backend; }
    location /sign/     { proxy_pass http://gosign_backend; }

    # Exact-match: POST /verify/pdf → backend; GET /verify → SPA (falls through to /)
    location = /verify/pdf { proxy_pass http://gosign_backend; }

    location = /health { proxy_pass http://gosign_backend; }

    location / { proxy_pass http://gosign_frontend; }
}
